<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plotter Layout View - 02-vector-connections.html</title>
  <style>
    body {
      background-color: #0c0c14;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: #38bdf8;
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: #8a8a9a;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .canvas-container {
      background: radial-gradient(circle at center, #141424 0%, #0e0e16 100%);
      border: 1px solid #2d2d3d;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      padding: 10px;
      overflow: auto;
    }
    svg {
      display: block;
      background: repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(255,255,255,0.03) 20px),
                  repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(255,255,255,0.03) 20px);
    }
  </style>
</head>
